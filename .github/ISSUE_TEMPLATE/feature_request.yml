name: Feature request
description: Suggest a connector, domain, or capability for CanonIQ
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that CanonIQ doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the connector, domain, or feature you'd like.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New connector (data source)
        - New domain (canonical schema)
        - Profiling / matching / scoring
        - Validation / transform / drift
        - CLI / SDK
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
