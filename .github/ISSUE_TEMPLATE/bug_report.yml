name: Bug report
description: Report a problem with CanonIQ
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. Please do not include real personal, health,
        financial, or educational data, or any secrets, in this issue. Use
        synthetic, minimal examples.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal command or code snippet using synthetic data.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CanonIQ version
      placeholder: "0.1.0 (output of `canoniq version`)"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14 / Ubuntu 24.04 / Windows 11"
    validations:
      required: false
