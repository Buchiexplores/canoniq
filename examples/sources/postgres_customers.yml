# Postgres source. Requires the `databases` extra: pip install "canoniq[databases]".
# Credentials are NEVER inlined — they are interpolated from environment variables.
#   export POSTGRES_HOST=... POSTGRES_PORT=5432 POSTGRES_DB=... \
#          POSTGRES_USER=... POSTGRES_PASSWORD=...
source:
  type: postgres
  host: ${POSTGRES_HOST}
  port: ${POSTGRES_PORT}
  database: ${POSTGRES_DB}
  username: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}
  table: customers
  sample_limit: 1000
