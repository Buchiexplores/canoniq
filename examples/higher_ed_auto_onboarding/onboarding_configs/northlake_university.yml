# Northlake University — a "happy path" provider with clean, well-named exports.
# Expect a high readiness score and auto-deploy = true.
provider:
  id: northlake_university
  name: Northlake University
  environment: staging
deployment:
  minimum_readiness_score: 90
  require_required_fields: true
  require_validation_pass: true
sources:
  - name: sis_students
    entity: student
    path: ../schools/northlake_university/sis_students.csv
    canonical: ../canonical/canonical_student.yml
    drift_path: ../schools/northlake_university/sis_students_drift.csv
  - name: lms_activity
    entity: student
    path: ../schools/northlake_university/lms_activity.csv
    canonical: ../canonical/canonical_student.yml
  - name: advising_notes
    entity: advising_interaction
    path: ../schools/northlake_university/advising_notes.csv
    canonical: ../canonical/canonical_advising_interaction.yml
output:
  dir: ../output/northlake_university
