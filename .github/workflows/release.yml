name: Release

# Publishes the package to PyPI when a version tag (vX.Y.Z) is pushed.
#
# One-time setup (no API token needed — uses PyPI Trusted Publishing / OIDC):
#   1. Create the project on https://pypi.org (or reserve the name).
#   2. PyPI → project → Settings → Publishing → "Add a trusted publisher":
#        Owner:        Buchiexplores
#        Repository:   canoniq
#        Workflow:     release.yml
#        Environment:  pypi
#   3. Tag a release:  git tag v0.1.0 && git push origin v0.1.0
#
# The build is verified (twine check) before any upload, and the tag must match
# the version declared in pyproject.toml.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: build & verify distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG pyproject=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::Tag v$TAG does not match pyproject version $PKG"; exit 1; }

      - name: Build sdist + wheel
        run: python -m build

      - name: Check metadata
        run: twine check dist/*

      - name: Upload built distribution
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
