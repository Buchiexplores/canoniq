# BigQuery source. Requires the `bigquery` extra: pip install "canoniq[bigquery]".
# Authentication uses Application Default Credentials (ADC) — no keys in this file.
#   gcloud auth application-default login
# Or point GOOGLE_APPLICATION_CREDENTIALS at a service-account file (kept out of the repo).
source:
  type: bigquery
  project_id: ${GCP_PROJECT_ID}
  dataset: student_success
  table: students
  sample_limit: 1000
